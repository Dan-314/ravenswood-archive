name: Update roles.json

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-roles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download latest roles.json
        run: curl -sS -o roles-upstream.json https://release.botc.app/resources/data/roles.json

      - name: Commit if changed
        run: |
          if diff -q roles.json roles-upstream.json > /dev/null 2>&1; then
            echo "No changes"
            rm roles-upstream.json
          else
            mv roles-upstream.json roles.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add roles.json
            git commit -m "update roles.json from upstream"
            git push
          fi
