name: Update roles.json

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-roles:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download latest roles.json
        run: curl -sS -o roles-upstream.json https://release.botc.app/resources/data/roles.json

      - name: Commit if changed
        id: commit
        run: |
          if diff -q roles.json roles-upstream.json > /dev/null 2>&1; then
            echo "No changes"
            rm roles-upstream.json
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            mv roles-upstream.json roles.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add roles.json
            git commit -m "update roles.json from upstream"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Seed characters table
        if: steps.commit.outputs.changed == 'true'
        run: node scripts/seed-characters.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
